name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: enesefetokta
          password: ${{ secrets.GITHUB_TOKEN }}

      # Frontend Build & Push
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/enesefetokta/fertile-notify-frontend:latest
          build-args: |
            VITE_API_URL=https://fertile-notify-api.enesefetokta.shop/api

      # API Build & Push
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/enesefetokta/fertile-notify-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u enesefetokta --password-stdin
            
            cd ~/Fertile-Notify
            git pull origin main
            
            docker-compose --profile prod pull
            docker-compose --profile prod up -d
            docker image prune -f