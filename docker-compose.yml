services:
  frontend:
    container_name: fertile-notify-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://fertile-notify-api.enesefetokta.shop/api
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - fertile-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    container_name: fertile-notify-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - RabbitMQ__Host=rabbitmq
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Redis__ConnectionString=redis:6379,abortConnect=false
      - JwtSettings__SecretKey=${JWT_SECRET}
    depends_on:
      - db
      - redis
      - rabbitmq
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      <<: *default-logging

  redis:
    container_name: fertile-notify-redis
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      <<: *default-logging
      
  rabbitmq:
    image: rabbitmq:3-management-alpine 
    container_name: fertile-notify-rabbitmq
    ports:
      - "${RABBITMQ_CONNECTION_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      <<: *default-logging

  db:
    container_name: fertile-notify-db
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 400M
    logging:
      <<: *default-logging

  tunnel:
    image: cloudflare/cloudflared:latest
    profiles: ["prod"]
    container_name: tunnel
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared
    networks:
      - fertile-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      <<: *default-logging

networks:
  fertile-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: