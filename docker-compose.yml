services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - fertile-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    container_name: api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_HOST=rabbitmq
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
      - redis
      - rabbitmq
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      <<: *default-logging

  redis:
    container_name: redis
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      <<: *default-logging

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-guest}
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      <<: *default-logging

  db:
    container_name: db
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fertile-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 400M
    logging:
      <<: *default-logging

  tunnel:
    image: cloudflare/cloudflared:latest
    profiles: [ "prod" ]
    container_name: tunnel
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared
    networks:
      - fertile-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      <<: *default-logging

networks:
  fertile-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
